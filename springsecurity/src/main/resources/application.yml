spring:
  application:
    name: springsecurity

  datasource:
    url: jdbc:h2:mem:springsecurity;MODE=MYSQL

  h2:
    console:
      enabled: true

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

